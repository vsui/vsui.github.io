<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo - Local History</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: #fff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
        }

        h1 {
            margin-bottom: 1rem;
            font-size: 1.4rem;
            color: #333;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 0.75rem;
            font-size: 1rem;
            font-family: inherit;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: #555;
        }

        .status {
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Notes</h1>
        <textarea id="notes" placeholder="Start typing..."></textarea>
        <p class="status" id="status">Loading...</p>
    </div>

    <script>
        const textarea = document.getElementById('notes');
        const status = document.getElementById('status');
        const STORAGE_KEY = 'demo-notes';

        // Restore saved text
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved !== null) {
            textarea.value = saved;
            status.textContent = 'Restored from local history.';
        } else {
            status.textContent = 'Nothing saved yet.';
        }

        // Save on input
        let saveTimer;
        textarea.addEventListener('input', () => {
            clearTimeout(saveTimer);
            status.textContent = 'Saving...';
            saveTimer = setTimeout(() => {
                localStorage.setItem(STORAGE_KEY, textarea.value);
                status.textContent = 'Saved.';
            }, 300);
        });
    </script>
</body>
</html>
